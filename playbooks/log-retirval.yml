---
- name: "BLE Orchestrator: Advanced Node Diagnostic"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Deployment: Provision Diagnostic Engine to Remote Node"
      copy:
        dest: /tmp/log_hunter_cli.py
        mode: '0755'
        content: |
          {% raw %}
          #!/usr/bin/env python3
          import os
          import subprocess
          import sys
          from datetime import datetime
          from pathlib import Path

          def parse_time_to_epoch(dt_str):
              if not dt_str or dt_str == "now - 1 hour":
                  return int(datetime.now().timestamp()) - 3600
              try:
                  return int(dt_str)
              except ValueError:
                  try:
                      dt = datetime.strptime(dt_str.replace("T", " "), "%Y-%m-%d %H:%M:%S")
                      return int(dt.timestamp())
                  except:
                      res = subprocess.run(["date", "-d", dt_str, "+%s"], capture_output=True, text=True)
                      return int(res.stdout.strip()) if res.returncode == 0 else None

          def find_file_path(pattern):
              """Find a file matching a pattern anywhere in the orchestrator path."""
              base = "/opt/go-ble-orchestrator"
              # Priority search in /logs/ and /logs/json_logs/
              direct_paths = [
                  f"{base}/logs/json_logs/{pattern}",
                  f"{base}/logs/{pattern}",
                  f"{base}/json_logs/{pattern}",
                  f"{base}/{pattern}"
              ]
              for p in direct_paths:
                  if os.path.exists(p): return p
                  
              # Fallback to system-level find
              cmd = f"find {base} -name '{pattern}' -type f | head -n 1"
              res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              return res.stdout.strip()

          def find_app_log():
              for name in ["logs/app.log", "app.log"]:
                  path = Path("/opt/go-ble-orchestrator") / name
                  if path.exists(): return str(path)
              return find_file_path("app.log")

          def run_diagnostic():
              action = os.getenv("ACTION", "Grep Info")
              target_id = os.getenv("DEVICE_ID", "").strip()
              start_time_str = os.getenv("START_TIME", "now - 1 hour")
              
              if not target_id:
                  print("Error: No Device ID provided.")
                  return

              # Standardize search strings
              mac_colons = target_id.replace("_", ":").upper()
              mac_underscores = target_id.replace(":", "_")

              if "Grep" in action:
                  log_map = {"info": "app.log", "mqtt": "mqtt-status.log", "sys": "sys-perf.log", "stats": "stats_5s.log"}
                  parts = action.split(" ")
                  base_request = parts[1].lower() if len(parts) > 1 else "app.log"
                  target_file = log_map.get(base_request, base_request)
                  
                  file_path = find_app_log() if target_file == "app.log" else find_file_path(target_file)
                  
                  if not file_path:
                      print(f"Error: Could not locate log file '{target_file}'")
                      return

                  print(f"--- Searching {file_path} for [{mac_colons}] ---")
                  cmd = f"tail -c 100M {file_path} | grep -iaF '{mac_colons}' | tail -n 50"
                  sys.stdout.flush()
                  subprocess.run(cmd, shell=True)

              elif action == "Search JSON":
                  start_ts = parse_time_to_epoch(start_time_str)
                  
                  # Try exact match, uppercase match, and lowercase match for the .log file
                  file_name = f"{mac_underscores}.log"
                  file_path = find_file_path(file_name) or find_file_path(file_name.upper()) or find_file_path(file_name.lower())
                  
                  if file_path and os.path.exists(file_path):
                      print(f"--- Extracting from: {file_path} ---")
                      print(f"--- Filters: Timestamp >= {start_ts} ---")
                      # AWK robustly extracts the first column regardless of format
                      awk_cmd = f"awk -v ts={start_ts} '{{ split($1, a, \"[\"); split(a[length(a)], b, \"]\"); val=b[1]; if (val == \"\") val=$1; if (val >= ts) print $0 }}' {file_path} | tail -n 100"
                      sys.stdout.flush()
                      subprocess.run(awk_cmd, shell=True)
                  else:
                      print(f"CRITICAL: Log file for {target_id} not found.")
                      print("DIAGNOSTIC: Listing contents of /opt/go-ble-orchestrator/logs/json_logs/")
                      json_dir = "/opt/go-ble-orchestrator/logs/json_logs"
                      if os.path.isdir(json_dir):
                          subprocess.run(f"ls -t {json_dir} | head -n 10", shell=True)
                      else:
                          print(f"Directory {json_dir} does not exist.")

              elif action == "Tail Live":
                  file_path = find_app_log()
                  if not file_path:
                      print("Error: app.log not found.")
                      return
                  print(f"--- Starting 60s Live Tail for {mac_colons} ---")
                  cmd = f"timeout 60s stdbuf -oL tail -f {file_path} | grep --line-buffered -iaF '{mac_colons}'"
                  sys.stdout.flush()
                  subprocess.run(cmd, shell=True)

          if __name__ == "__main__":
              run_diagnostic()
          {% endraw %}

    - name: "Execution: Trigger Diagnostic Logic"
      shell: "python3 /tmp/log_hunter_cli.py"
      environment:
        DEVICE_ID: "{{ DEVICE_ID }}"
        ACTION: "{{ ACTION }}"
        START_TIME: "{{ START_TIME | default('now - 1 hour') }}"
      register: hunter_output

    - name: "Output: Present Diagnostic Findings"
      debug:
        msg: "{{ hunter_output.stdout_lines }}"
      when: ACTION != "Tail Live"