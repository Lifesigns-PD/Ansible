---
- name: Update configuration and restart services
  hosts: all
  become: no
  gather_facts: no

  tasks:
    - name: Parse updated config variables
      set_fact:
        cassia_domain: "{{ cassia_domain | default('http://172.16.20.24') }}"
        mqtt_broker: "{{ mqtt_broker | default('tcp://localhost:1883') }}"
        config_password: "{{ config_password | default('Config@2024') }}"
      tags: [always]

    - name: Check if config.json exists
      stat:
        path: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json"
      register: config_stat

    - name: Backup current configuration
      copy:
        src: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json"
        dest: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json.backup"
        remote_src: yes
      when: config_stat.stat.exists

    - name: Update cassia_domain in config.json
      replace:
        path: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json"
        regexp: '"cassiaUrl"\s*:\s*"[^"]*"'
        replace: '"cassiaUrl": "{{ cassia_domain }}"'
      when: config_stat.stat.exists
      notify: restart orchestrator

    - name: Update mqtt_broker in config.json
      replace:
        path: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json"
        regexp: '"mqttBroker"\s*:\s*"[^"]*"'
        replace: '"mqttBroker": "{{ mqtt_broker }}"'
      when: config_stat.stat.exists
      notify: restart orchestrator

    - name: Wait for configuration reload
      pause:
        seconds: 5

    - name: Verify orchestrator service status
      shell: systemctl is-active "{{ service_name | default('go-ble-orchestrator') }}"
      register: svc_status
      ignore_errors: yes

    - name: Display service status
      debug:
        msg: "Service state: {{ svc_status.stdout | default('unknown') }}"

    - name: Check dashboard responds
      uri:
        url: "http://localhost:{{ orchestrator_port | default('8083') }}/"
        status_code: [200, 404]
      register: dashboard_check
      retries: 3
      delay: 2
      ignore_errors: yes

    - name: Display result
      debug:
        msg: "Configuration updated. HTTP status: {{ dashboard_check.status | default('unreachable') }}"

  handlers:
    - name: restart orchestrator
      shell: sudo systemctl restart "{{ service_name | default('go-ble-orchestrator') }}"
      ignore_errors: yes