---
- name: Rollback to previous version
  hosts: all
  become: no
  gather_facts: no

  pre_tasks:
    - name: Verify binary backup exists
      stat:
        path: "{{ app_bin_path | default('/opt/go-ble-orchestrator/go-ble-orchestrator') }}.backup"
      register: binary_backup

    - name: Abort if no backup found
      fail:
        msg: "No binary backup found at {{ app_bin_path | default('/opt/go-ble-orchestrator/go-ble-orchestrator') }}.backup — cannot rollback."
      when: not binary_backup.stat.exists

  tasks:
    - name: Stop orchestrator service
      shell: sudo systemctl stop "{{ service_name | default('go-ble-orchestrator') }}"
      ignore_errors: yes

    - name: Restore previous binary
      copy:
        src: "{{ app_bin_path | default('/opt/go-ble-orchestrator/go-ble-orchestrator') }}.backup"
        dest: "{{ app_bin_path | default('/opt/go-ble-orchestrator/go-ble-orchestrator') }}"
        remote_src: yes
        mode: '0755'

    - name: Restore previous configuration
      copy:
        src: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json.backup"
        dest: "{{ app_config_path | default('/opt/go-ble-orchestrator/config') }}/config.json"
        remote_src: yes
        mode: '0644'
      ignore_errors: yes

    - name: Start orchestrator service
      shell: sudo systemctl start "{{ service_name | default('go-ble-orchestrator') }}"
      ignore_errors: yes

    - name: Wait for orchestrator to respond
      uri:
        url: "http://localhost:{{ orchestrator_port | default('8083') }}/health"
        status_code: [200, 404]
      register: result
      until: result.status in [200, 404]
      retries: 10
      delay: 2
      ignore_errors: yes

    - name: Check final service status
      shell: systemctl is-active "{{ service_name | default('go-ble-orchestrator') }}"
      register: final_status
      ignore_errors: yes

    - name: Rollback complete
      debug:
        msg: "Rollback done. Service state: {{ final_status.stdout | default('unknown') }}"