---
- name: Rollback to previous version
  hosts: orchestrator_servers
  become: yes
  gather_facts: no

  pre_tasks:
    - name: Confirm rollback proceed
      pause:
        prompt: "WARNING: This will rollback to the previous version. Continue? (yes/no)"
      register: rollback_confirm
      when: not skip_confirm | default(false)

    - name: Verify backup exists
      stat:
        path: "{{ app_bin_path }}.backup"
      register: binary_backup
      failed_when: not binary_backup.stat.exists

  tasks:
    - name: Stop orchestrator service
      systemd_service:
        name: "{{ service_name }}"
        state: stopped
      become: yes

    - name: Restore previous binary
      copy:
        src: "{{ app_bin_path }}.backup"
        dest: "{{ app_bin_path }}"
        remote_src: yes
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: 0755
      become: yes

    - name: Restore previous configuration
      copy:
        src: "{{ app_config_path }}/config.json.backup"
        dest: "{{ app_config_path }}/config.json"
        remote_src: yes
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: 0644
      become: yes
      ignore_errors: yes

    - name: Start orchestrator service
      systemd_service:
        name: "{{ service_name }}"
        state: started
      become: yes

    - name: Wait for orchestrator to be ready
      uri:
        url: "http://{{ inventory_hostname }}:{{ orchestrator_port }}/health"
        status_code: [200, 404]
      register: result
      until: result.status in [200, 404]
      retries: 10
      delay: 2
      ignore_errors: yes

    - name: Rollback complete
      debug:
        msg: "Successfully rolled back to previous version"
