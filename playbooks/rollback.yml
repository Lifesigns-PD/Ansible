---
# rollback.yml
# Restores go-ble-orchestrator from the most recent backup in /opt/backups/
# Backups are created automatically by deploy.yml.
# Gateway-dashboard is re-downloaded from GitHub latest if no backup exists.

- name: Rollback BLE Orchestrator + Gateway Dashboard
  hosts: all
  become: yes
  become_method: sudo
  gather_facts: no

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    backup_dir: "/opt/backups"

  tasks:

    # ─────────────────────────────────────────────
    # FIND BACKUP
    # ─────────────────────────────────────────────

    - name: Find latest orchestrator backup
      shell: ls -dt {{ backup_dir }}/orchestrator_* 2>/dev/null | head -1
      register: latest_backup
      changed_when: false

    - name: Fail if no backup exists
      fail:
        msg: >
          No orchestrator backup found in {{ backup_dir }}.
          Run deploy.yml at least once first to create a backup.
      when: latest_backup.stdout | trim == ""

    - name: Set backup path fact
      set_fact:
        orch_backup_path: "{{ latest_backup.stdout | trim }}"

    - name: Show which backup will be restored
      debug:
        msg: "Restoring from: {{ orch_backup_path }}"

    # ─────────────────────────────────────────────
    # STOP SERVICES
    # ─────────────────────────────────────────────

    - name: Stop running services
      shell: |
        for svc in "{{ service_name }}" "{{ gateway_service_name }}"; do
          if systemctl list-unit-files 2>/dev/null | grep -q "^${svc}\.service"; then
            systemctl stop "${svc}" || true
          fi
        done
        pkill -f "{{ service_name }}" || true
        pkill -f "{{ gateway_service_name }}" || true
      changed_when: true

    # ─────────────────────────────────────────────
    # RESTORE ORCHESTRATOR
    # ─────────────────────────────────────────────

    - name: Remove current orchestrator installation
      file:
        path: "{{ install_dir }}"
        state: absent

    - name: Restore orchestrator from backup
      shell: cp -r "{{ orch_backup_path }}" "{{ install_dir }}"
      changed_when: true

    - name: Ensure orchestrator binary is executable
      shell: |
        find "{{ install_dir }}" -name "go-ble-orchestrator" -type f -exec chmod +x {} \;
        find "{{ install_dir }}" -name "ecg_metrics" -type f -exec chmod +x {} \;
      changed_when: true

    # ─────────────────────────────────────────────
    # RESTART SERVICES
    # ─────────────────────────────────────────────

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start orchestrator
      systemd:
        name: "{{ service_name }}"
        state: started
        enabled: yes

    - name: Enable and start gateway-dashboard
      systemd:
        name: "{{ gateway_service_name }}"
        state: started
        enabled: yes
      ignore_errors: yes

    # ─────────────────────────────────────────────
    # VERIFY
    # ─────────────────────────────────────────────

    - name: Check service status after rollback
      shell: |
        orch=$(systemctl is-active {{ service_name }} 2>/dev/null || echo inactive)
        gw=$(systemctl is-active {{ gateway_service_name }} 2>/dev/null || echo inactive)
        echo "orchestrator=${orch}"
        echo "gateway=${gw}"
      register: rollback_status
      changed_when: false

    - name: Parse service states
      set_fact:
        orch_state: "{{ rollback_status.stdout | regex_search('orchestrator=(.+)', '\\1') | first | default('unknown') }}"
        gw_state: "{{ rollback_status.stdout | regex_search('gateway=(.+)', '\\1') | first | default('unknown') }}"

    - name: Rollback summary
      debug:
        msg: |
          ════════════════════════════════════════════════════
                         ROLLBACK COMPLETE
          ════════════════════════════════════════════════════
           Host:                {{ inventory_hostname }}
           Restored from:       {{ orch_backup_path | basename }}
           Orchestrator status: {{ orch_state | upper }}
           Gateway status:      {{ gw_state | upper }}
          ════════════════════════════════════════════════════

    - name: Warn if orchestrator not running after rollback
      debug:
        msg: >
          WARNING: go-ble-orchestrator is {{ orch_state }}.
          Check logs: sudo journalctl -u {{ service_name }} -n 50
      when: orch_state != 'active'

    - name: Warn if gateway not running after rollback
      debug:
        msg: >
          WARNING: gateway-dashboard is {{ gw_state }}.
          Check logs: sudo journalctl -u {{ gateway_service_name }} -n 50
      when: gw_state != 'active'