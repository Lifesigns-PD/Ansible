---
- name: BLE Orchestrator Diagnostic
  hosts: all
  gather_facts: false

  tasks:
    - name: Standardize MAC Formats
      set_fact:
        # We use the survey variable directly here
        mac_colons: "{{ DEVICE_ID | replace('_', ':') | upper }}"
        mac_underscores: "{{ DEVICE_ID | replace(':', '_') | lower }}"
        current_action: "{{ ACTION }}"

    - name: DEBUG - Show search strings
      debug:
        msg: 
          - "Searching for: {{ mac_colons }}"
          - "Action selected: {{ current_action }}"

    - name: Action - Grep Device Info from App Log
      # -F treates the pattern as a fixed string (better for colons)
      # -i handles case just in case
      shell: "grep -Fi '{{ mac_colons }}' /opt/go-ble-orchestrator/app.log | tail -n 20"
      register: grep_output
      when: current_action == "Grep Info"

    - name: Action - Live Tail App Log
      shell: "timeout 60s tail -f /opt/go-ble-orchestrator/app.log | grep --line-buffered -Fi '{{ mac_colons }}'"
      register: tail_output
      when: current_action == "Tail Live"

    - name: Action - Search JSON by Timestamp
      shell: |
        TARGET_EPOCH=$(date -d '{{ START_TIME | default("now - 1 hour") }}' +%s)
        find /opt/go-ble-orchestrator/json_logs -name "*{{ mac_underscores }}*" \
        -exec awk -v ts="$TARGET_EPOCH" '$1 >= ts' {} \;
      register: json_output
      when: current_action == "Search JSON"

    - name: Display Results
      debug:
        msg: "{{ grep_output.stdout_lines if current_action == 'Grep Info' else (json_output.stdout_lines if current_action == 'Search JSON' else 'Tail task finished') }}"
      when: current_action != "Tail Live"