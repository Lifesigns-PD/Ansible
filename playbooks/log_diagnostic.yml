---
- name: BLE Orchestrator Diagnostic
  hosts: all
  gather_facts: false

  tasks:
    - name: Standardize MAC Formats
      set_fact:
        mac_colons: "{{ DEVICE_ID | replace('_', ':') | upper | trim }}"
        current_action: "{{ ACTION }}"

    - name: DIAGNOSTIC - File and User Check
      shell: "whoami && ls -lh /opt/go-ble-orchestrator/app.log && tail -n 2 /opt/go-ble-orchestrator/app.log"
      register: diag_out

    - name: Show System Diagnostic
      debug:
        var: diag_out.stdout_lines

    - name: Action - Grep Device Info
      # We use 'grep -E' for extended regex and 'fixed strings' to avoid any escaping weirdness
      shell: "grep -i '{{ mac_colons }}' /opt/go-ble-orchestrator/app.log | tail -n 20"
      register: grep_output
      when: current_action == "Grep Info"
      ignore_errors: yes

    - name: Display Grep Results
      debug:
        msg: 
          - "Search String: [{{ mac_colons }}]"
          - "Results: {{ grep_output.stdout_lines }}"
      when: current_action == "Grep Info"