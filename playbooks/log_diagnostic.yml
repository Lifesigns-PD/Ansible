---
- name: BLE Orchestrator Diagnostic
  hosts: all
  gather_facts: false

  tasks:
    - name: Standardize MAC Formats
      set_fact:
        mac_colons: "{{ DEVICE_ID | replace('_', ':') | upper | trim }}"
        mac_underscores: "{{ DEVICE_ID | replace(':', '_') | lower | trim }}"
        current_action: "{{ ACTION }}"

    - name: Action - Grep Recent History
      shell: "tail -n 500000 /opt/go-ble-orchestrator/app.log | grep -Fi '{{ mac_colons }}' | tail -n 50"
      register: grep_output
      when: current_action == "Grep Info"

    - name: Action - Live Tail (60s)
      shell: "timeout 60s tail -f /opt/go-ble-orchestrator/app.log | grep --line-buffered -Fi '{{ mac_colons }}'"
      when: current_action == "Tail Live"

    - name: Action - Search JSON Logs
      # 1. Find files matching the device ID
      # 2. Convert human START_TIME to Epoch
      # 3. Use awk to print lines where the first column ($1) is >= the target epoch
      shell: |
        TARGET_EPOCH=$(date -d '{{ START_TIME | default("now - 1 hour") }}' +%s)
        find /opt/go-ble-orchestrator/json_logs -name "*{{ mac_underscores }}*" -type f \
        -exec awk -v ts="$TARGET_EPOCH" '$1 >= ts' {} + | sort -n
      register: json_output
      when: current_action == "Search JSON"

    - name: Display Results
      debug:
        msg: 
          - "Device: [{{ mac_colons }}]"
          - "Search Type: {{ current_action }}"
          - "--- DATA FOUND ---"
          - "{{ grep_output.stdout_lines if current_action == 'Grep Info' else (json_output.stdout_lines if current_action == 'Search JSON' else 'Tail task finished') }}"
      when: current_action != "Tail Live"