---
# deploy.yml
# Wrapper playbook: Downloads and executes your Bash script directly.

- name: Deploy BLE Orchestrator via Bash Setup Script
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Download setup.sh from GitHub
      get_url:
        url: "https://github.com/Lifesigns-PD/orchestrator-releases/releases/download/setup/setup.sh"
        dest: "/tmp/setup.sh"
        mode: '0755'
      # Force download even in dry run
      check_mode: no

    - name: Patch setup.sh (Hotfix Regex, Pipefail, and Interactive Prompts)
      # This fixes the regex, safety rules, and automatically answers the prompts 
      # so the script never hangs waiting for user input.
      shell: |
        # 1. Fix the regex and pipefail crashing issues
        sed -i 's/Installationsmain-\[\^"\]+/Installationsmain\[\^"\]*/g' /tmp/setup.sh
        sed -i 's/set -euo pipefail/set -uo pipefail/g' /tmp/setup.sh
        
        # 2. Bypass interactive prompts by hardcoding the variables
        # Auto-confirm directory removals
        sed -i 's/read -r -p "${prompt_message}" response/response="yes"/g' /tmp/setup.sh
        # Auto-confirm gateway update
        sed -i 's/read -r -p "Additionally you need to update the gateway-dashboard version. Type yes to continue: " update_gateway_dashboard/update_gateway_dashboard="yes"/g' /tmp/setup.sh
        # Auto-decline the nano config editor
        sed -i 's/read -r -p "Do you want to edit gateway-dashboard config.json now? Type yes to open sudo nano: " edit_gateway_config/edit_gateway_config="no"/g' /tmp/setup.sh
      # FORCE this task to run to prevent the script from keeping interactive prompts
      check_mode: no

    - name: Execute setup.sh in Debug Mode
      # Using bash -x prints every command executed to the log for easy debugging.
      # We also pipe the answers as a secondary failsafe just in case.
      shell: printf "yes\nyes\nno\n" | bash -x /tmp/setup.sh
      register: bash_output
      check_mode: no

    - name: Show setup.sh output
      debug:
        var: bash_output.stdout_lines

    - name: Verify go-ble-orchestrator service logs
      shell: journalctl -u go-ble-orchestrator.service -n 20 --no-pager
      register: service_logs
      ignore_errors: yes
      check_mode: no

    - name: Show service logs
      debug:
        var: service_logs.stdout_lines