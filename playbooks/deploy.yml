---
# deploy.yml
# Fully automated native deployment. No external setup.sh required.
# Completely bypasses interactive prompts for automated CI/CD.

- name: Deploy BLE Orchestrator + Gateway Dashboard Natively
  hosts: all
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: yes

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    orchestrator_service_file: "/etc/systemd/system/go-ble-orchestrator.service"
    backup_dir: "/opt/backups"
    repo_api_url: "https://api.github.com/repos/Lifesigns-PD/orchestrator-releases/releases/latest"
    gateway_repo_api_url: "https://api.github.com/repos/PD-dev-2025/gateway-dashboard-release/releases/latest"

  tasks:

    # ─────────────────────────────────────────────
    # STEP 1: PREFLIGHT CHECKS
    # ─────────────────────────────────────────────

    - name: "[1/9] Assert OS is Ubuntu 22.04+"
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 22
        fail_msg: "Requires Ubuntu 22.04+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: "[1/9] Verify running as root (become check)"
      shell: whoami
      register: whoami_result
      changed_when: false

    - name: "[1/9] Show effective user"
      debug:
        msg: "Running as: {{ whoami_result.stdout }} (must be root)"

    - name: "[1/9] Fail if not running as root"
      fail:
        msg: >
          Not running as root (got '{{ whoami_result.stdout }}').
          Check that MPR-SSH is set as Sudo Credentials in the Semaphore inventory.
      when: whoami_result.stdout != 'root'

    # ─────────────────────────────────────────────
    # STEP 2: INSTALL PREREQUISITES
    # ─────────────────────────────────────────────

    - name: "[2/9] Release any held apt/dpkg locks"
      shell: |
        for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock /var/lib/apt/lists/lock; do
          pid=$(lsof "${lock}" 2>/dev/null | awk 'NR>1{print $2}' | head -1)
          [ -n "${pid}" ] && kill -9 "${pid}" 2>/dev/null || true
        done
        rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock /var/lib/apt/lists/lock
        DEBIAN_FRONTEND=noninteractive dpkg --configure -a 2>/dev/null || true
      changed_when: false

    - name: "[2/9] Ensure required packages (curl, unzip, zip, sudo) are installed"
      apt:
        name: [curl, unzip, zip, sudo]
        state: present
        update_cache: yes

    # ─────────────────────────────────────────────
    # STEP 3: BACKUP
    # ─────────────────────────────────────────────

    - name: "[3/9] Create backup directory"
      shell: mkdir -p "{{ backup_dir }}"
      changed_when: false

    - name: "[3/9] Backup existing orchestrator"
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          BACKUP_PATH="{{ backup_dir }}/orchestrator_$(date +%Y%m%d_%H%M%S)"
          cp -r "{{ install_dir }}" "${BACKUP_PATH}"
          ls -dt {{ backup_dir }}/orchestrator_* | tail -n +4 | xargs rm -rf || true
          echo "Backed up to: ${BACKUP_PATH}"
        else
          echo "No existing installation to backup"
        fi
      register: orchestrator_backup
      changed_when: "'Backed up' in orchestrator_backup.stdout"

    # ─────────────────────────────────────────────
    # STEP 4: STOP OLD SERVICES
    # ─────────────────────────────────────────────

    - name: "[4/9] Stop and remove old services safely"
      shell: |
        # Stop and disable existing services
        for svc in "{{ service_name }}" "{{ gateway_service_name }}"; do
          if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
            systemctl stop "${svc}" || true
            systemctl disable "${svc}" || true
          fi
        done
        
        # Kill stray processes safely using exact match to avoid killing this shell
        pkill -x "{{ service_name }}" || true
        pkill -x "{{ gateway_service_name }}" || true
        
        # Remove directories
        rm -rf "{{ install_dir }}"
        rm -rf "{{ gateway_install_dir }}"
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 5: CREATE TEMP DIR
    # ─────────────────────────────────────────────

    - name: "[5/9] Create temp working directory"
      shell: mktemp -d
      register: work_dir_result
      changed_when: false

    - name: "[5/9] Set work_dir fact"
      set_fact:
        work_dir: "{{ work_dir_result.stdout | trim }}"

    # ─────────────────────────────────────────────
    # STEP 6: DOWNLOAD & INSTALL ORCHESTRATOR
    # ─────────────────────────────────────────────

    - name: "[6/9] Fetch orchestrator release metadata"
      shell: curl -fsSL "{{ repo_api_url }}"
      register: orchestrator_meta
      changed_when: false

    - name: "[6/9] Extract Orchestrator Details (Native Filters)"
      set_fact:
        orchestrator_zip_url: "{{ orchestrator_meta.stdout | regex_search('https://[^\" ]*Installationsmain[^\" ]*\\.zip') }}"
        orchestrator_version: "{{ (orchestrator_meta.stdout | regex_search('\"tag_name\":\\s*\"([^\"]+)\"', '\\1')) | first | default('unknown') }}"

    - name: "[6/9] Download and Unzip Orchestrator"
      shell: |
        curl -fL "{{ orchestrator_zip_url }}" -o "{{ work_dir }}/bundle.zip"
        unzip -q "{{ work_dir }}/bundle.zip" -d "{{ work_dir }}"
        chmod +x {{ work_dir }}/Installationsmain/*.sh
        chmod +x {{ work_dir }}/Installationsmain/ecg_metrics
      changed_when: true

    - name: "[6/9] Run Orchestrator Installer"
      shell: |
        cd "{{ work_dir }}/Installationsmain"
        yes | ./DeviceManager_Install.sh
      register: orch_install
      changed_when: true

    - name: "[6/9] Copy auxiliary files"
      shell: cp "{{ work_dir }}/Installationsmain/ecg_metrics" "{{ install_dir }}/"
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 7: DOWNLOAD & INSTALL GATEWAY DASHBOARD
    # ─────────────────────────────────────────────

    - name: "[7/9] Fetch gateway metadata"
      shell: curl -fsSL "{{ gateway_repo_api_url }}"
      register: gateway_meta
      changed_when: false

    - name: "[7/9] Extract Gateway Details (Native Filters)"
      set_fact:
        gateway_zip_url: "{{ gateway_meta.stdout | regex_search('https://[^\" ]*linux_amd64\\.zip') }}"
        gateway_version: "{{ (gateway_meta.stdout | regex_search('\"tag_name\":\\s*\"([^\"]+)\"', '\\1')) | first | default('unknown') }}"

    - name: "[7/9] Download and Prepare Gateway"
      shell: |
        mkdir -p "{{ work_dir }}/gw"
        curl -fL "{{ gateway_zip_url }}" -o "{{ work_dir }}/gw.zip"
        unzip -q "{{ work_dir }}/gw.zip" -d "{{ work_dir }}/gw"
        mkdir -p "{{ gateway_install_dir }}"
        # Copy example to standard config
        cp "{{ work_dir }}/gw/config.json.example" "{{ gateway_install_dir }}/config.json"
        # Install binary
        cp "{{ work_dir }}/gw/gateway-dashboard" "{{ gateway_install_dir }}/"
        chmod +x "{{ gateway_install_dir }}/gateway-dashboard"
      changed_when: true

    - name: "[7/9] Create gateway-dashboard service file"
      shell: |
        tee "{{ gateway_service_file }}" >/dev/null <<EOF
        [Unit]
        Description=Gateway Dashboard Service
        After=network.target

        [Service]
        Type=simple
        User=root
        WorkingDirectory={{ gateway_install_dir }}
        ExecStart={{ gateway_install_dir }}/gateway-dashboard
        Restart=always
        RestartSec=5

        [Install]
        WantedBy=multi-user.target
        EOF
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 8: START SERVICES
    # ─────────────────────────────────────────────

    - name: "[8/9] Reload and Start Services"
      shell: |
        systemctl daemon-reload
        systemctl enable {{ service_name }}
        systemctl enable {{ gateway_service_name }}
        systemctl start {{ service_name }}
        systemctl start {{ gateway_service_name }}
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 9: SUMMARY & CLEANUP
    # ─────────────────────────────────────────────

    - name: "[9/9] Final Service Check"
      shell: |
        echo "Orchestrator: $(systemctl is-active {{ service_name }} 2>/dev/null || echo 'inactive')"
        echo "Gateway: $(systemctl is-active {{ gateway_service_name }} 2>/dev/null || echo 'inactive')"
      register: final_status
      changed_when: false

    - name: "[9/9] Deployment summary"
      debug:
        msg: |
          ════════════════════════════════════════════════════════
                       DEPLOYMENT COMPLETE SUMMARY
          ════════════════════════════════════════════════════════
           SYSTEM STATUS:
             OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
             Target: {{ inventory_hostname }}
          
           ORCHESTRATOR:
             Version: {{ orchestrator_version }}
             Service: {{ service_name }}
             Status:  {{ final_status.stdout_lines[0] | split(':') | last | trim | upper }}
          
           GATEWAY DASHBOARD:
             Version: {{ gateway_version }}
             Service: {{ gateway_service_name }}
             Status:  {{ final_status.stdout_lines[1] | split(':') | last | trim | upper }}
          
           MAINTENANCE:
             Backups: {{ backup_dir }}
             Working Dir: {{ work_dir }} (Cleaning now...)
          ════════════════════════════════════════════════════════

    - name: "[9/9] Cleanup temp directory"
      shell: rm -rf "{{ work_dir }}"
      changed_when: false

    - name: "[9/9] Fail if orchestrator not running"
      fail:
        msg: "go-ble-orchestrator is not active after deployment."
      when: "'active' not in final_status.stdout_lines[0]"

    - name: "[9/9] Fail if gateway not running"
      fail:
        msg: "gateway-dashboard is not active after deployment."
      when: "'active' not in final_status.stdout_lines[1]"