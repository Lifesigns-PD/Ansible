---
# deploy.yml
# Fully automated native deployment with robust path detection and error handling.

- name: Deploy BLE Orchestrator + Gateway Dashboard Natively
  hosts: all
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: yes

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    binary_name: "go-ble-orchestrator"
    rr_binary_name: "ecg_metrics"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    backup_dir: "/opt/backups"
    repo_api_url: "https://api.github.com/repos/Lifesigns-PD/orchestrator-releases/releases/latest"
    gateway_repo_api_url: "https://api.github.com/repos/PD-dev-2025/gateway-dashboard-release/releases/latest"

  tasks:

    # ─────────────────────────────────────────────
    # STEP 1: OS & PERMISSION CHECKS
    # ─────────────────────────────────────────────

    - name: "[1/9] Assert OS is Ubuntu 22.04+"
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 22
        fail_msg: "Requires Ubuntu 22.04+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: "[1/9] Verify root privileges"
      shell: whoami
      register: whoami_result
      changed_when: false
      failed_when: whoami_result.stdout != 'root'

    # ─────────────────────────────────────────────
    # STEP 2: SILENT PREREQUISITE INSTALLATION
    # ─────────────────────────────────────────────

    - name: "[2/9] Cleanup apt locks and install core tools"
      shell: |
        set -e
        for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock /var/lib/apt/lists/lock; do
          pid=$(lsof "${lock}" 2>/dev/null | awk 'NR>1{print $2}' | head -1)
          [ -n "${pid}" ] && kill -9 "${pid}" 2>/dev/null || true
        done
        rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock /var/lib/apt/lists/lock
        DEBIAN_FRONTEND=noninteractive dpkg --configure -a 2>/dev/null || true
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y curl unzip zip sudo ansible python3-apt
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 3: BACKUP
    # ─────────────────────────────────────────────

    - name: "[3/9] Create backup directory"
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: "[3/9] Backup existing orchestrator"
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          BACKUP_PATH="{{ backup_dir }}/orchestrator_$(date +%Y%m%d_%H%M%S)"
          cp -r "{{ install_dir }}" "${BACKUP_PATH}"
          ls -dt {{ backup_dir }}/orchestrator_* | tail -n +4 | xargs rm -rf || true
          echo "Backed up"
        fi
      register: backup_check
      changed_when: "'Backed up' in backup_check.stdout"

    # ─────────────────────────────────────────────
    # STEP 4: STOP OLD SERVICES
    # ─────────────────────────────────────────────

    - name: "[4/9] Stop and remove old services safely"
      shell: |
        for svc in "{{ service_name }}" "{{ gateway_service_name }}"; do
          if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
            systemctl stop "${svc}" || true
            systemctl disable "${svc}" || true
          fi
        done
        pkill -x "{{ binary_name }}" || true
        pkill -x "{{ gateway_service_name }}" || true
        rm -rf "{{ install_dir }}"
        rm -rf "{{ gateway_install_dir }}"
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 5: TEMP WORKING DIR
    # ─────────────────────────────────────────────

    - name: "[5/9] Create temp working directory"
      shell: mktemp -d
      register: work_dir_result
      changed_when: false

    - name: "[5/9] Set work_dir fact"
      set_fact:
        work_dir: "{{ work_dir_result.stdout | trim }}"

    # ─────────────────────────────────────────────
    # STEP 6: ORCHESTRATOR INSTALL (REVISED FOR NESTED ZIPS)
    # ─────────────────────────────────────────────
# ─────────────────────────────────────────────
    # STEP 6: ORCHESTRATOR INSTALL (REVISED FOR CRLF FIX)
    # ─────────────────────────────────────────────

    - name: "[6/9] Fetch latest orchestrator and install"
      shell: |
        set -e
        # 1. Fetch metadata and identify URLs
        META=$(curl -fsSL "{{ repo_api_url }}")
        ZIP_URL=$(echo "$META" | grep -oP 'https://[^"]*Installationsmain[^"]*\.zip' | head -n 1)
        VERSION=$(echo "$META" | grep -oP '"tag_name":\s*"\K[^"]+')
        
        # 2. Download and Extract
        curl -fL "$ZIP_URL" -o "{{ work_dir }}/bundle.zip"
        unzip -q "{{ work_dir }}/bundle.zip" -d "{{ work_dir }}"
        
        # 3. Dynamic Path Detection
        INSTALL_SCRIPT_PATH=$(find "{{ work_dir }}" -name "DeviceManager_Install.sh" | head -n 1)
        if [ -z "$INSTALL_SCRIPT_PATH" ]; then
          echo "Error: DeviceManager_Install.sh not found in ZIP."
          exit 1
        fi
        SCRIPT_DIR=$(dirname "$INSTALL_SCRIPT_PATH")
        
        # 4. FIX CRLF (Windows Line Endings) <-- NEW FIX
        # This removes the \r characters that cause the "not found" error
        sed -i 's/\r$//' "$SCRIPT_DIR"/*.sh
        
        # 5. Prepare Permissions
        chmod +x "$SCRIPT_DIR"/*.sh
        chmod +x "$SCRIPT_DIR"/{{ binary_name }}
        chmod +x "$SCRIPT_DIR"/{{ rr_binary_name }} || true
        
        # 6. Execute Installation
        cd "$SCRIPT_DIR"
        yes | ./DeviceManager_Install.sh
        
        # 7. Safety Sync
        if [ ! -d "{{ install_dir }}" ]; then mkdir -p "{{ install_dir }}"; fi
        chmod +x {{ install_dir }}/{{ binary_name }}
        cp -f ecg_metrics "{{ install_dir }}/" || true
        
        echo "Successfully installed $VERSION"
      register: orch_result
      changed_when: true

    # ─────────────────────────────────────────────
    # STEP 7: GATEWAY INSTALL
    # ─────────────────────────────────────────────

    - name: "[7/9] Fetch and install Gateway Dashboard"
      shell: |
        set -e
        G_META=$(curl -fsSL "{{ gateway_repo_api_url }}")
        G_ZIP=$(echo "$G_META" | grep -oP 'https://[^"]*linux_amd64\.zip' | head -n 1)
        mkdir -p "{{ work_dir }}/gw"
        curl -fL "$G_ZIP" -o "{{ work_dir }}/gw.zip"
        unzip -q "{{ work_dir }}/gw.zip" -d "{{ work_dir }}/gw"
        mkdir -p "{{ gateway_install_dir }}"
        cp "{{ work_dir }}/gw/config.json.example" "{{ gateway_install_dir }}/config.json"
        cp "{{ work_dir }}/gw/gateway-dashboard" "{{ gateway_install_dir }}/"
        chmod +x "{{ gateway_install_dir }}/gateway-dashboard"
      changed_when: true

    - name: "[7/9] Create gateway systemd file"
      copy:
        dest: "{{ gateway_service_file }}"
        content: |
          [Unit]
          Description=Gateway Dashboard Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory={{ gateway_install_dir }}
          ExecStart={{ gateway_install_dir }}/gateway-dashboard
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ─────────────────────────────────────────────
    # STEP 8: START & VERIFY
    # ─────────────────────────────────────────────

    - name: "[8/9] Start Services"
      systemd:
        daemon_reload: yes
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - "{{ service_name }}"
        - "{{ gateway_service_name }}"

    - name: "[9/9] Final Service Check"
      shell: |
        echo "Orchestrator: $(systemctl is-active {{ service_name }})"
        echo "Gateway: $(systemctl is-active {{ gateway_service_name }})"
      register: final_status
      changed_when: false

    - name: "[9/9] Cleanup and Finish"
      file:
        path: "{{ work_dir }}"
        state: absent
      changed_when: false

    - name: "[9/9] Validate Deployment"
      fail:
        msg: "Services failed to start: {{ final_status.stdout }}"
      when: "'inactive' in final_status.stdout"