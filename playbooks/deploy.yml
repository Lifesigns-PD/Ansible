---
# deploy.yml
# Fully automated native deployment. No external setup.sh required.
# Completely bypasses interactive prompts for automated CI/CD.

- name: Deploy BLE Orchestrator + Gateway Dashboard Natively
  hosts: all
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: yes

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    orchestrator_service_file: "/etc/systemd/system/go-ble-orchestrator.service"
    backup_dir: "/opt/backups"
    repo_api_url: "https://api.github.com/repos/Lifesigns-PD/orchestrator-releases/releases/latest"
    gateway_repo_api_url: "https://api.github.com/repos/PD-dev-2025/gateway-dashboard-release/releases/latest"

  tasks:

    # ─────────────────────────────────────────────
    # 1. PREFLIGHT: Install system requirements
    # ─────────────────────────────────────────────
    - name: Ensure required packages (curl, unzip, zip, sudo) are installed
      apt:
        name: [curl, unzip, zip, sudo]
        state: present
        update_cache: yes

    - name: Assert OS is Ubuntu 22.04+
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 22

    # ─────────────────────────────────────────────
    # 2. PREPARATION: Backups and Directories
    # ─────────────────────────────────────────────
    - name: Create backup and temp directories
      shell: |
        mkdir -p "{{ backup_dir }}"
        mktemp -d
      register: work_dir_raw

    - name: Set working directory fact
      set_fact:
        work_dir: "{{ work_dir_raw.stdout_lines[-1] | trim }}"

    - name: Backup existing orchestrator
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          BACKUP_PATH="{{ backup_dir }}/orchestrator_$(date +%Y%m%d_%H%M%S)"
          cp -r "{{ install_dir }}" "${BACKUP_PATH}"
          ls -dt {{ backup_dir }}/orchestrator_* | tail -n +3 | xargs rm -rf || true
        fi

    - name: Stop old services safely
      shell: |
        systemctl stop {{ service_name }} || true
        systemctl stop {{ gateway_service_name }} || true
        pkill -f "{{ service_name }}" || true
        pkill -f "{{ gateway_service_name }}" || true
        rm -rf "{{ install_dir }}"
        rm -rf "{{ gateway_install_dir }}"

    # ─────────────────────────────────────────────
    # 3. ORCHESTRATOR: Download and Install
    # ─────────────────────────────────────────────
    - name: Fetch Orchestrator Metadata
      shell: |
        curl -fsSL "{{ repo_api_url }}"
      register: orchestrator_meta

    - name: Extract Orchestrator Details
      set_fact:
        orchestrator_zip_url: "{{ orchestrator_meta.stdout | regex_search('https://[^\" ]*Installationsmain[^\" ]*\\.zip') }}"
        orchestrator_version: "{{ orchestrator_meta.stdout | regex_findall('\"tag_name\":\\s*\"([^\"]+)\"') | first | default('unknown') }}"

    - name: Download and Unzip Orchestrator
      shell: |
        curl -fL "{{ orchestrator_zip_url }}" -o "{{ work_dir }}/bundle.zip"
        unzip -q "{{ work_dir }}/bundle.zip" -d "{{ work_dir }}"
        chmod +x {{ work_dir }}/Installationsmain/*.sh
        chmod +x {{ work_dir }}/Installationsmain/ecg_metrics

    - name: Run Orchestrator Installer
      shell: |
        cd "{{ work_dir }}/Installationsmain"
        yes | ./DeviceManager_Install.sh
      register: install_log

    - name: Copy auxiliary files
      shell: |
        cp "{{ work_dir }}/Installationsmain/ecg_metrics" "{{ install_dir }}/"

    # ─────────────────────────────────────────────
    # 4. GATEWAY: Download and Install
    # ─────────────────────────────────────────────
    - name: Fetch Gateway Metadata
      shell: |
        curl -fsSL "{{ gateway_repo_api_url }}"
      register: gateway_meta

    - name: Extract Gateway Details
      set_fact:
        gateway_zip_url: "{{ gateway_meta.stdout | regex_search('https://[^\" ]*linux_amd64\\.zip') }}"
        gateway_version: "{{ gateway_meta.stdout | regex_findall('\"tag_name\":\\s*\"([^\"]+)\"') | first | default('unknown') }}"

    - name: Download and Prepare Gateway
      shell: |
        mkdir -p "{{ work_dir }}/gw"
        curl -fL "{{ gateway_zip_url }}" -o "{{ work_dir }}/gw.zip"
        unzip -q "{{ work_dir }}/gw.zip" -d "{{ work_dir }}/gw"
        mkdir -p "{{ gateway_install_dir }}"
        cp "{{ work_dir }}/gw/config.json.example" "{{ work_dir }}/gw/config.json"

    - name: Install Gateway Binary and Service
      shell: |
        cp "{{ work_dir }}/gw/gateway-dashboard" "{{ gateway_install_dir }}/"
        cp "{{ work_dir }}/gw/config.json" "{{ gateway_install_dir }}/"
        chmod +x "{{ gateway_install_dir }}/gateway-dashboard"
        
        tee "{{ gateway_service_file }}" >/dev/null <<EOF
        [Unit]
        Description=Gateway Dashboard Service
        After=network.target

        [Service]
        Type=simple
        User=root
        WorkingDirectory={{ gateway_install_dir }}
        ExecStart={{ gateway_install_dir }}/gateway-dashboard
        Restart=always
        RestartSec=5

        [Install]
        WantedBy=multi-user.target
        EOF

    # ─────────────────────────────────────────────
    # 5. FINALIZATION: Start and Clean
    # ─────────────────────────────────────────────
    - name: Reload and Start Services
      shell: |
        systemctl daemon-reload
        systemctl enable {{ service_name }}
        systemctl enable {{ gateway_service_name }}
        systemctl start {{ service_name }}
        systemctl start {{ gateway_service_name }}
        rm -rf "{{ work_dir }}"

    - name: Final Service Check
      shell: |
        echo "Orchestrator: $(systemctl is-active {{ service_name }})"
        echo "Gateway: $(systemctl is-active {{ gateway_service_name }})"
      register: final_status

    - name: Show Final Deployment Summary
      debug:
        msg: |
          ════════════════════════════════════════════════════════
                       DEPLOYMENT COMPLETE SUMMARY
          ════════════════════════════════════════════════════════
           SYSTEM STATUS:
             OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
             Target: {{ inventory_hostname }}
          
           ORCHESTRATOR:
             Version: {{ orchestrator_version }}
             Service: {{ service_name }}
             Status:  {{ final_status.stdout_lines[0] | split(':') | last | trim }}
          
           GATEWAY DASHBOARD:
             Version: {{ gateway_version }}
             Service: {{ gateway_service_name }}
             Status:  {{ final_status.stdout_lines[1] | split(':') | last | trim }}
          
           MAINTENANCE:
             Backups: {{ backup_dir }}
             Working Dir: Cleaned
          ════════════════════════════════════════════════════════

    - name: Fail if go-ble-orchestrator not running
      fail:
        msg: "go-ble-orchestrator is not active after deployment."
      when: "'active' not in final_status.stdout_lines[0]"

    - name: Fail if gateway-dashboard not running
      fail:
        msg: "gateway-dashboard is not active after deployment."
      when: "'active' not in final_status.stdout_lines[1]"