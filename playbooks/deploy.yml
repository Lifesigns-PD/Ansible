---
# deploy.yml
# Deploys go-ble-orchestrator + gateway-dashboard from GitHub releases.
# Semaphore: set User Credentials + Sudo Credentials both to MPR-SSH in the inventory.
# Inventory text should only be:
#   [my_target]
#   172.16.22.67 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

- name: Deploy BLE Orchestrator + Gateway Dashboard
  hosts: all
  become: yes
  become_method: sudo
  gather_facts: yes

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    backup_dir: "/opt/backups"
    repo_api_url: "https://api.github.com/repos/Lifesigns-PD/orchestrator-releases/releases/latest"
    gateway_repo_api_url: "https://api.github.com/repos/PD-dev-2025/gateway-dashboard-release/releases/latest"

  tasks:

    # ─────────────────────────────────────────────
    # PREFLIGHT
    # ─────────────────────────────────────────────

    - name: Assert OS is Ubuntu 22.04+
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 22
        fail_msg: "Requires Ubuntu 22.04+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Install required packages
      apt:
        name: [curl, unzip]
        state: present
        update_cache: yes

    # ─────────────────────────────────────────────
    # BACKUP & PREPARE
    # ─────────────────────────────────────────────

    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Create temp working directory
      tempfile:
        state: directory
      register: work_dir

    - name: Backup existing orchestrator installation
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          BACKUP="{{ backup_dir }}/orchestrator_$(date +%Y%m%d_%H%M%S)"
          cp -r "{{ install_dir }}" "${BACKUP}"
          ls -dt {{ backup_dir }}/orchestrator_* 2>/dev/null | tail -n +4 | xargs rm -rf || true
          echo "Backed up to: ${BACKUP}"
        else
          echo "No existing installation to backup"
        fi
      register: backup_result
      changed_when: "'Backed up' in backup_result.stdout"

    - name: Show backup result
      debug:
        msg: "{{ backup_result.stdout }}"

    # ─────────────────────────────────────────────
    # STOP OLD SERVICES
    # ─────────────────────────────────────────────

    - name: Stop and disable old services
      shell: |
        for svc in "{{ service_name }}" "{{ gateway_service_name }}"; do
          if systemctl list-unit-files 2>/dev/null | grep -q "^${svc}\.service"; then
            systemctl stop "${svc}" || true
            systemctl disable "${svc}" || true
          fi
        done
        pkill -f "{{ service_name }}" || true
        pkill -f "{{ gateway_service_name }}" || true
      changed_when: true

    - name: Remove old installation directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ install_dir }}"
        - "{{ gateway_install_dir }}"

    # ─────────────────────────────────────────────
    # DOWNLOAD & INSTALL ORCHESTRATOR
    # ─────────────────────────────────────────────

    - name: Fetch orchestrator release metadata from GitHub
      uri:
        url: "{{ repo_api_url }}"
        return_content: yes
        headers:
          Accept: "application/vnd.github+json"
        timeout: 30
      register: orchestrator_release
      retries: 3
      delay: 5

    - name: Extract orchestrator download URL and version
      set_fact:
        orchestrator_zip_url: >-
          {{ orchestrator_release.json.assets
             | selectattr('name', 'match', '.*Installationsmain.*\\.zip')
             | map(attribute='browser_download_url')
             | first }}
        orchestrator_version: "{{ orchestrator_release.json.tag_name }}"

    - name: Show orchestrator version being deployed
      debug:
        msg: "Deploying orchestrator {{ orchestrator_version }}"

    - name: Download orchestrator zip
      get_url:
        url: "{{ orchestrator_zip_url }}"
        dest: "{{ work_dir.path }}/orchestrator.zip"
        timeout: 120
        mode: '0644'

    - name: Unzip orchestrator bundle
      unarchive:
        src: "{{ work_dir.path }}/orchestrator.zip"
        dest: "{{ work_dir.path }}"
        remote_src: yes

    - name: Verify Installationsmain directory exists
      stat:
        path: "{{ work_dir.path }}/Installationsmain"
      register: bundle_stat

    - name: Fail if bundle structure is wrong
      fail:
        msg: "Unzipped bundle is missing Installationsmain/ directory."
      when: not bundle_stat.stat.exists

    - name: Make installer executable
      file:
        path: "{{ work_dir.path }}/Installationsmain/DeviceManager_Install.sh"
        mode: '0755'

    - name: Run orchestrator installer
      shell: |
        cd "{{ work_dir.path }}/Installationsmain"
        ./DeviceManager_Install.sh
      args:
        executable: /bin/bash
      register: install_output
      changed_when: true

    - name: Show installer output
      debug:
        var: install_output.stdout_lines

    - name: Enable orchestrator service
      systemd:
        name: "{{ service_name }}"
        enabled: yes
        daemon_reload: yes
      ignore_errors: yes

    # ─────────────────────────────────────────────
    # DOWNLOAD & INSTALL GATEWAY DASHBOARD
    # ─────────────────────────────────────────────

    - name: Fetch gateway-dashboard release metadata from GitHub
      uri:
        url: "{{ gateway_repo_api_url }}"
        return_content: yes
        headers:
          Accept: "application/vnd.github+json"
        timeout: 30
      register: gateway_release
      retries: 3
      delay: 5

    - name: Extract gateway download URL and version
      set_fact:
        gateway_zip_url: >-
          {{ gateway_release.json.assets
             | selectattr('name', 'match', '.*linux_amd64\\.zip')
             | map(attribute='browser_download_url')
             | first }}
        gateway_version: "{{ gateway_release.json.tag_name }}"

    - name: Show gateway version being deployed
      debug:
        msg: "Deploying gateway-dashboard {{ gateway_version }}"

    - name: Create gateway work directory
      file:
        path: "{{ work_dir.path }}/gateway"
        state: directory
        mode: '0755'

    - name: Download gateway-dashboard zip
      get_url:
        url: "{{ gateway_zip_url }}"
        dest: "{{ work_dir.path }}/gateway/gateway.zip"
        timeout: 120
        mode: '0644'

    - name: Unzip gateway-dashboard bundle
      unarchive:
        src: "{{ work_dir.path }}/gateway/gateway.zip"
        dest: "{{ work_dir.path }}/gateway"
        remote_src: yes

    - name: Verify gateway binary exists
      stat:
        path: "{{ work_dir.path }}/gateway/gateway-dashboard"
      register: gw_binary

    - name: Fail if gateway binary missing
      fail:
        msg: "gateway-dashboard binary not found in downloaded bundle."
      when: not gw_binary.stat.exists

    - name: Create gateway install directory
      file:
        path: "{{ gateway_install_dir }}"
        state: directory
        mode: '0755'

    - name: Copy config.json.example to config.json
      copy:
        src: "{{ work_dir.path }}/gateway/config.json.example"
        dest: "{{ work_dir.path }}/gateway/config.json"
        remote_src: yes

    - name: Install gateway binary
      copy:
        src: "{{ work_dir.path }}/gateway/gateway-dashboard"
        dest: "{{ gateway_install_dir }}/gateway-dashboard"
        remote_src: yes
        mode: '0755'

    - name: Install gateway config
      copy:
        src: "{{ work_dir.path }}/gateway/config.json"
        dest: "{{ gateway_install_dir }}/config.json"
        remote_src: yes
        mode: '0644'

    - name: Create gateway-dashboard systemd service
      copy:
        dest: "{{ gateway_service_file }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Gateway Dashboard Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory={{ gateway_install_dir }}
          ExecStart={{ gateway_install_dir }}/gateway-dashboard
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier={{ gateway_service_name }}

          [Install]
          WantedBy=multi-user.target

    # ─────────────────────────────────────────────
    # START SERVICES
    # ─────────────────────────────────────────────

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start orchestrator
      systemd:
        name: "{{ service_name }}"
        state: started
        enabled: yes

    - name: Enable and start gateway-dashboard
      systemd:
        name: "{{ gateway_service_name }}"
        state: started
        enabled: yes

    # ─────────────────────────────────────────────
    # CLEANUP & VERIFY
    # ─────────────────────────────────────────────

    - name: Remove temp working directory
      file:
        path: "{{ work_dir.path }}"
        state: absent

    - name: Check final service status
      shell: |
        orch=$(systemctl is-active {{ service_name }} 2>/dev/null || echo inactive)
        gw=$(systemctl is-active {{ gateway_service_name }} 2>/dev/null || echo inactive)
        echo "orchestrator=${orch}"
        echo "gateway=${gw}"
      register: final_status
      changed_when: false

    - name: Parse service states
      set_fact:
        orch_state: "{{ final_status.stdout | regex_search('orchestrator=(.+)', '\\1') | first | default('unknown') }}"
        gw_state: "{{ final_status.stdout | regex_search('gateway=(.+)', '\\1') | first | default('unknown') }}"

    - name: Deployment summary
      debug:
        msg: |
          ════════════════════════════════════════════════════
                       DEPLOYMENT COMPLETE
          ════════════════════════════════════════════════════
           Host:               {{ inventory_hostname }}
           Orchestrator:       {{ orchestrator_version }} → {{ orch_state | upper }}
           Gateway Dashboard:  {{ gateway_version }} → {{ gw_state | upper }}
           Backups:            {{ backup_dir }}
          ════════════════════════════════════════════════════

    - name: Fail if orchestrator not running
      fail:
        msg: "go-ble-orchestrator is {{ orch_state }}. Run: sudo journalctl -u {{ service_name }} -n 50"
      when: orch_state != 'active'

    - name: Fail if gateway not running
      fail:
        msg: "gateway-dashboard is {{ gw_state }}. Run: sudo journalctl -u {{ gateway_service_name }} -n 50"
      when: gw_state != 'active'