---
- name: Deploy BLE Orchestrator via GitHub Script
  hosts: orchestrator_servers
  become: yes
  gather_facts: yes
  max_fail_percentage: 0

  tasks:
    - name: Display deployment info
      debug:
        msg: "Deploying latest release from GitHub to {{ inventory_hostname }}"

    - name: Download setup.sh from GitHub
      ansible.builtin.get_url:
        url: "https://github.com/Lifesigns-PD/orchestrator-releases/releases/download/setup/setup.sh"
        dest: "/tmp/setup.sh"
        mode: '0755' # This automatically handles the 'chmod +x'
        force: yes

    - name: Execute the setup.sh script automatically
      ansible.builtin.shell: |
        # We pipe the answers to bypass the interactive prompts in your script:
        # 1. 'yes' -> Are you sure you want to remove previous files?
        # 2. 'yes' -> Additionally you need to update the gateway-dashboard version?
        # 3. 'no'  -> Do you want to edit gateway-dashboard config.json now in nano? (MUST be no!)
        printf "yes\nyes\nno\n" | /tmp/setup.sh
      args:
        executable: /bin/bash
      register: script_output

    - name: Display setup script logs
      debug:
        var: script_output.stdout_lines

  post_tasks:
    - name: Verify services are running
      block:
        - name: Check orchestrator service status
          systemd_service:
            name: go-ble-orchestrator
          register: orchestrator_status
        
        - name: Check gateway-dashboard status
          systemd_service:
            name: gateway-dashboard
          register: gateway_status
        
        - name: Display service results
          debug:
            msg: |
              ✓ Orchestrator: {{ orchestrator_status.status.ActiveState | default('Unknown') }}
              ✓ Gateway Dashboard: {{ gateway_status.status.ActiveState | default('Unknown') }}
      ignore_errors: yes