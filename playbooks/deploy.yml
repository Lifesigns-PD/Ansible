---
# deploy.yml
# Fully automated deployment — no prompts, no waiting.
# If old installation exists → backup → uninstall → install fresh.

- name: Deploy BLE Orchestrator + Gateway Dashboard
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    service_name: "go-ble-orchestrator"
    install_dir: "/opt/go-ble-orchestrator"
    gateway_service_name: "gateway-dashboard"
    gateway_install_dir: "/opt/gateway-dashboard"
    gateway_service_file: "/etc/systemd/system/gateway-dashboard.service"
    orchestrator_service_file: "/etc/systemd/system/go-ble-orchestrator.service"
    backup_dir: "/opt/backups"
    repo_api_url: "https://api.github.com/repos/Lifesigns-PD/orchestrator-releases/releases/latest"
    gateway_repo_api_url: "https://api.github.com/repos/PD-dev-2025/gateway-dashboard-release/releases/latest"

  tasks:

    # ─────────────────────────────────────────────
    # PREFLIGHT CHECKS
    # ─────────────────────────────────────────────

    - name: Check required commands exist (curl, unzip, sudo)
      shell: "command -v {{ item }}"
      loop:
        - curl
        - unzip
        - sudo
      register: cmd_check

    - name: Check OS is Ubuntu 22.04+
      shell: |
        DIST=$(lsb_release -is)
        VER=$(lsb_release -rs | cut -d. -f1)
        if [ "$DIST" = "Ubuntu" ] && [ "$VER" -ge 22 ]; then
          echo "OK"
        else
          echo "FAIL: $DIST $VER"
          exit 1
        fi
      register: os_check

    - name: Show OS Status
      debug:
        msg: "System Check: {{ os_check.stdout }}"
    - name: Show OS
      debug:
        msg: "{{ os_check.stdout }}"

    # ─────────────────────────────────────────────
    # CREATE BACKUP + TEMP DIRS
    # ─────────────────────────────────────────────

    - name: Create backup directory
      shell: sudo mkdir -p "{{ backup_dir }}"

    - name: Create temp working directory
      shell: mktemp -d
      register: work_dir_result

    - name: Set work_dir fact
      set_fact:
        work_dir: "{{ work_dir_result.stdout | trim }}"

    # ─────────────────────────────────────────────
    # BACKUP OLD ORCHESTRATOR INSTALLATION
    # ─────────────────────────────────────────────

    - name: Backup existing orchestrator installation if present
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          BACKUP_PATH="{{ backup_dir }}/go-ble-orchestrator_backup_$(date +%Y%m%d_%H%M%S)"
          sudo cp -r "{{ install_dir }}" "${BACKUP_PATH}"
          # Keep only the latest backup, remove older ones
          ls -dt {{ backup_dir }}/go-ble-orchestrator_backup_* 2>/dev/null | tail -n +2 | xargs sudo rm -rf || true
          echo "Backed up to: ${BACKUP_PATH}"
        else
          echo "No existing installation to backup"
        fi
      register: orchestrator_backup

    - name: Show orchestrator backup result
      debug:
        msg: "{{ orchestrator_backup.stdout }}"

    - name: Backup existing orchestrator service file if present
      shell: |
        if [ -f "{{ orchestrator_service_file }}" ]; then
          sudo cp "{{ orchestrator_service_file }}" "{{ backup_dir }}/go-ble-orchestrator.service.backup"
          echo "Service file backed up"
        else
          echo "No existing service file to backup"
        fi
      ignore_errors: yes

    # ─────────────────────────────────────────────
    # STOP + REMOVE OLD ORCHESTRATOR
    # ─────────────────────────────────────────────

    - name: Stop and disable go-ble-orchestrator service
      shell: |
        if sudo systemctl list-unit-files 2>/dev/null | grep -q "^{{ service_name }}\.service"; then
          sudo systemctl stop {{ service_name }} || true
          sudo systemctl disable {{ service_name }} || true
          echo "Stopped and disabled"
        else
          echo "Service did not exist"
        fi
      register: stop_orchestrator

    - name: Show stop result
      debug:
        msg: "{{ stop_orchestrator.stdout }}"

    - name: Kill any remaining orchestrator processes
      shell: sudo pkill -f "{{ service_name }}" || true
      ignore_errors: yes

    - name: Remove /opt/go-ble-orchestrator
      shell: |
        if [ -d "{{ install_dir }}" ]; then
          sudo rm -rf "{{ install_dir }}"
          echo "Removed {{ install_dir }}"
        else
          echo "Nothing to remove"
        fi
      register: remove_orchestrator

    - name: Show removal result
      debug:
        msg: "{{ remove_orchestrator.stdout }}"

    # ─────────────────────────────────────────────
    # DOWNLOAD + INSTALL NEW ORCHESTRATOR
    # ─────────────────────────────────────────────

    - name: Fetch latest orchestrator release metadata
      shell: curl -fsSL "{{ repo_api_url }}"
      register: release_json

    - name: Extract orchestrator zip URL
      shell: |
        echo '{{ release_json.stdout }}' | grep -oP 'https://[^"]*Installationsmain[^"]*\.zip' | head -n 1
      register: zip_url_result

    - name: Extract orchestrator tag name
      shell: |
        printf '%s\n' '{{ release_json.stdout }}' | grep -oE '"tag_name":[[:space:]]*"[^"]+"' | head -n 1 | cut -d '"' -f 4
      register: tag_name_result

    - name: Fail if orchestrator zip URL not found
      fail:
        msg: "Could not find Installationsmain zip in latest release."
      when: zip_url_result.stdout | trim == ''

    - name: Show orchestrator version being installed
      debug:
        msg: "Installing orchestrator version: {{ tag_name_result.stdout }}"

    - name: Download orchestrator zip
      shell: curl -fL "{{ zip_url_result.stdout | trim }}" -o "{{ work_dir }}/Installationsmain.zip"

    - name: Unzip orchestrator bundle
      shell: unzip -q "{{ work_dir }}/Installationsmain.zip" -d "{{ work_dir }}"

    - name: Verify Installationsmain directory exists
      shell: test -d "{{ work_dir }}/Installationsmain" && echo "OK" || echo "MISSING"
      register: bundle_check

    - name: Fail if bundle structure is wrong
      fail:
        msg: "Unzipped bundle does not contain Installationsmain/ directory."
      when: "'MISSING' in bundle_check.stdout"

    - name: Make DeviceManager_Install.sh executable
      shell: chmod +x "{{ work_dir }}/Installationsmain/DeviceManager_Install.sh"

    - name: Run DeviceManager_Install.sh
      shell: |
        cd "{{ work_dir }}/Installationsmain"
        yes | sudo ./DeviceManager_Install.sh
      register: installer_output

    - name: Show installer output
      debug:
        var: installer_output.stdout_lines

    - name: Enable go-ble-orchestrator service
      shell: sudo systemctl enable "{{ service_name }}" || true

    # ─────────────────────────────────────────────
    # BACKUP OLD GATEWAY INSTALLATION
    # ─────────────────────────────────────────────

    - name: Backup existing gateway-dashboard installation if present
      shell: |
        if [ -d "{{ gateway_install_dir }}" ]; then
          BACKUP_PATH="{{ backup_dir }}/gateway-dashboard_backup_$(date +%Y%m%d_%H%M%S)"
          sudo cp -r "{{ gateway_install_dir }}" "${BACKUP_PATH}"
          # Keep only the latest backup
          ls -dt {{ backup_dir }}/gateway-dashboard_backup_* 2>/dev/null | tail -n +2 | xargs sudo rm -rf || true
          echo "Backed up to: ${BACKUP_PATH}"
        else
          echo "No existing gateway installation to backup"
        fi
      register: gateway_backup

    - name: Show gateway backup result
      debug:
        msg: "{{ gateway_backup.stdout }}"

    - name: Backup existing gateway service file if present
      shell: |
        if [ -f "{{ gateway_service_file }}" ]; then
          sudo cp "{{ gateway_service_file }}" "{{ backup_dir }}/gateway-dashboard.service.backup"
          echo "Gateway service file backed up"
        else
          echo "No existing gateway service file to backup"
        fi
      ignore_errors: yes

    # ─────────────────────────────────────────────
    # STOP + REMOVE OLD GATEWAY
    # ─────────────────────────────────────────────

    - name: Stop and disable gateway-dashboard service
      shell: |
        if sudo systemctl list-unit-files 2>/dev/null | grep -q "^{{ gateway_service_name }}\.service"; then
          sudo systemctl stop {{ gateway_service_name }} || true
          sudo systemctl disable {{ gateway_service_name }} || true
          echo "Stopped and disabled"
        else
          echo "Service did not exist"
        fi
      register: stop_gateway

    - name: Show gateway stop result
      debug:
        msg: "{{ stop_gateway.stdout }}"

    - name: Kill any remaining gateway processes
      shell: sudo pkill -f "{{ gateway_service_name }}" || true
      ignore_errors: yes

    - name: Remove /opt/gateway-dashboard
      shell: |
        if [ -d "{{ gateway_install_dir }}" ]; then
          sudo rm -rf "{{ gateway_install_dir }}"
          echo "Removed {{ gateway_install_dir }}"
        else
          echo "Nothing to remove"
        fi
      register: remove_gateway

    - name: Show gateway removal result
      debug:
        msg: "{{ remove_gateway.stdout }}"

    # ─────────────────────────────────────────────
    # DOWNLOAD + INSTALL NEW GATEWAY DASHBOARD
    # ─────────────────────────────────────────────

    - name: Fetch latest gateway-dashboard release metadata
      shell: curl -fsSL "{{ gateway_repo_api_url }}"
      register: gateway_release_json

    - name: Extract gateway zip URL
      shell: |
        printf '%s\n' '{{ gateway_release_json.stdout }}' | grep -oE '"browser_download_url":[[:space:]]*"[^"]+linux_amd64\.zip"' | head -n 1 | cut -d '"' -f 4
      register: gateway_zip_url_result

    - name: Extract gateway tag name
      shell: |
        printf '%s\n' '{{ gateway_release_json.stdout }}' | grep -oE '"tag_name":[[:space:]]*"[^"]+"' | head -n 1 | cut -d '"' -f 4
      register: gateway_tag_result

    - name: Fail if gateway zip URL not found
      fail:
        msg: "Could not find gateway-dashboard linux_amd64 zip in latest release."
      when: gateway_zip_url_result.stdout | trim == ''

    - name: Show gateway version being installed
      debug:
        msg: "Installing gateway-dashboard version: {{ gateway_tag_result.stdout }}"

    - name: Create gateway work directory
      shell: mkdir -p "{{ work_dir }}/gateway-dashboard"

    - name: Download gateway-dashboard zip
      shell: curl -fL "{{ gateway_zip_url_result.stdout | trim }}" -o "{{ work_dir }}/gateway-dashboard/gateway-dashboard_linux_amd64.zip"

    - name: Unzip gateway-dashboard bundle
      shell: unzip -q "{{ work_dir }}/gateway-dashboard/gateway-dashboard_linux_amd64.zip" -d "{{ work_dir }}/gateway-dashboard"

    - name: Verify gateway-dashboard binary exists
      shell: test -f "{{ work_dir }}/gateway-dashboard/gateway-dashboard" && echo "OK" || echo "MISSING"
      register: gw_binary_check

    - name: Fail if gateway binary missing
      fail:
        msg: "gateway-dashboard binary not found in downloaded bundle."
      when: "'MISSING' in gw_binary_check.stdout"

    - name: Verify config.json.example exists
      shell: test -f "{{ work_dir }}/gateway-dashboard/config.json.example" && echo "OK" || echo "MISSING"
      register: gw_config_check

    - name: Fail if config.json.example missing
      fail:
        msg: "config.json.example not found in downloaded bundle."
      when: "'MISSING' in gw_config_check.stdout"

    - name: Create /opt/gateway-dashboard directory
      shell: sudo mkdir -p "{{ gateway_install_dir }}"

    - name: Copy config.json.example to config.json (no manual editing)
      shell: cp "{{ work_dir }}/gateway-dashboard/config.json.example" "{{ work_dir }}/gateway-dashboard/config.json"

    - name: Install gateway-dashboard binary
      shell: sudo cp "{{ work_dir }}/gateway-dashboard/gateway-dashboard" "{{ gateway_install_dir }}/"

    - name: Install gateway-dashboard config.json
      shell: sudo cp "{{ work_dir }}/gateway-dashboard/config.json" "{{ gateway_install_dir }}/"

    - name: Install README.md if present
      shell: |
        if [ -f "{{ work_dir }}/gateway-dashboard/README.md" ]; then
          sudo cp "{{ work_dir }}/gateway-dashboard/README.md" "{{ gateway_install_dir }}/"
        fi
      ignore_errors: yes

    - name: Make gateway-dashboard binary executable
      shell: sudo chmod +x "{{ gateway_install_dir }}/gateway-dashboard"

    - name: Write gateway-dashboard systemd service file
      shell: |
        sudo tee "{{ gateway_service_file }}" >/dev/null <<SVCEOF
        [Unit]
        Description=Gateway Dashboard Service
        After=network.target

        [Service]
        Type=simple
        User=root
        WorkingDirectory={{ gateway_install_dir }}
        ExecStart={{ gateway_install_dir }}/gateway-dashboard
        Restart=always
        RestartSec=5
        StandardOutput=journal
        StandardError=journal
        SyslogIdentifier={{ gateway_service_name }}

        [Install]
        WantedBy=multi-user.target
        SVCEOF

    - name: Reload systemd daemon
      shell: sudo systemctl daemon-reload

    - name: Enable gateway-dashboard service
      shell: sudo systemctl enable "{{ gateway_service_name }}"

    - name: Start gateway-dashboard service
      shell: sudo systemctl start "{{ gateway_service_name }}"

    # ─────────────────────────────────────────────
    # CLEANUP + FINAL STATUS
    # ─────────────────────────────────────────────

    - name: Clean up temp working directory
      shell: rm -rf "{{ work_dir }}"
      ignore_errors: yes

    - name: Check go-ble-orchestrator final status
      shell: systemctl is-active "{{ service_name }}" 2>/dev/null || echo "inactive"
      register: final_orchestrator_status
      ignore_errors: yes

    - name: Check gateway-dashboard final status
      shell: systemctl is-active "{{ gateway_service_name }}" 2>/dev/null || echo "inactive"
      register: final_gateway_status
      ignore_errors: yes

    - name: Show final deployment status
      debug:
        msg: |
          ════════════════════════════════════════════════
           DEPLOYMENT COMPLETE
          ════════════════════════════════════════════════
           go-ble-orchestrator : {{ final_orchestrator_status.stdout | default('unknown') }}
           gateway-dashboard   : {{ final_gateway_status.stdout | default('unknown') }}
           Backups stored in   : {{ backup_dir }}
          ════════════════════════════════════════════════

    - name: Fail if go-ble-orchestrator not running
      fail:
        msg: "go-ble-orchestrator is not active after deployment."
      when: final_orchestrator_status.stdout | default('') not in ['active', 'activating']

    - name: Fail if gateway-dashboard not running
      fail:
        msg: "gateway-dashboard is not active after deployment."
      when: final_gateway_status.stdout | default('') not in ['active', 'activating']